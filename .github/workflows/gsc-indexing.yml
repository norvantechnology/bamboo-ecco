name: 🌿 GSC Auto-Indexing

on:
  push:
    branches:
      - main
  # Manual trigger from GitHub UI → Actions tab → Run workflow
  workflow_dispatch:
    inputs:
      force_all:
        description: "Submit ALL sitemap URLs (ignores diff — use for first-time or full reindex)"
        required: false
        default: "false"

# Only one indexing run at a time — never cancel a running one
concurrency:
  group: gsc-indexing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  index:
    name: Compare Sitemaps & Submit to GSC
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ──────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────
      # 2. Setup Node 24 (matches current GitHub Actions default, no deprecation warnings)
      # ──────────────────────────────────────────
      - name: 🟢  Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ──────────────────────────────────────────
      # 3. Diagnostics — check SITE_URL and site reachability
      #    This step NEVER fails the job — it only prints debug info.
      #    The Node.js script in the next step does the actual fetching with retries.
      # ──────────────────────────────────────────
      - name: 🔎  Diagnostics — check SITE_URL and connectivity
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SITE_URL DIAGNOSTICS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── 1. Check secret is set
          if [ -z "$SITE_URL" ]; then
            echo "❌ FATAL: SITE_URL secret is empty or not set!"
            echo "   Fix: GitHub repo → Settings → Secrets → Actions → New secret"
            echo "        Name=SITE_URL   Value=https://yourdomain.com"
            exit 1
          fi
          echo "✅ SITE_URL secret is set"

          # ── 2. Length check (reveals hidden whitespace/newline problems)
          RAW_LEN=${#SITE_URL}
          TRIMMED=$(echo "$SITE_URL" | tr -d '[:space:]')
          TRIMMED_LEN=${#TRIMMED}
          echo "   Character length (raw):     $RAW_LEN"
          echo "   Character length (trimmed): $TRIMMED_LEN"
          if [ "$RAW_LEN" != "$TRIMMED_LEN" ]; then
            echo "⚠️  WARNING: SITE_URL has leading/trailing whitespace or a newline!"
            echo "   This is likely the cause of HTTP 000."
            echo "   Fix: Delete the SITE_URL secret and re-add it (paste carefully, no spaces)"
          fi

          # ── 3. Protocol check
          if echo "$SITE_URL" | grep -qE '^https?://'; then
            echo "✅ SITE_URL starts with http:// or https://"
          else
            echo "⚠️  WARNING: SITE_URL does NOT start with https://"
            echo "   Current value starts with: $(echo "$SITE_URL" | cut -c1-10)..."
            echo "   Fix: Secret value should be exactly: https://yourdomain.com"
          fi

          # ── 4. DNS check — does the hostname resolve?
          HOSTNAME=$(echo "$SITE_URL" | sed 's|https\?://||' | cut -d'/' -f1 | cut -d':' -f1 | tr -d '[:space:]')
          echo ""
          echo "   Extracted hostname: $HOSTNAME"
          echo "   Attempting DNS resolution..."
          if nslookup "$HOSTNAME" > /tmp/dns_result.txt 2>&1; then
            echo "✅ DNS resolved OK:"
            grep -E "Address|Name" /tmp/dns_result.txt | head -5 || true
          else
            echo "❌ DNS FAILED for hostname: $HOSTNAME"
            echo "   This means the domain doesn't exist or can't be resolved."
            cat /tmp/dns_result.txt || true
          fi

          # ── 5. Full curl verbose test (stderr = connection details)
          echo ""
          echo "   Running curl (verbose) against: $HOSTNAME/sitemap.xml"
          HTTP_CODE=$(curl -s \
            -o /tmp/sitemap_body.txt \
            -w "%{http_code}" \
            --max-time 20 \
            --connect-timeout 10 \
            -L \
            --verbose \
            "${TRIMMED}/sitemap.xml" 2>/tmp/curl_verbose.txt) || HTTP_CODE="000"

          echo "   HTTP status code: $HTTP_CODE"
          echo ""
          echo "   curl verbose output (connection details):"
          echo "   ──────────────────────────────────────────"
          cat /tmp/curl_verbose.txt | head -40 || true
          echo "   ──────────────────────────────────────────"

          if [ "$HTTP_CODE" = "200" ]; then
            BYTES=$(wc -c < /tmp/sitemap_body.txt)
            echo ""
            echo "✅ SUCCESS: Sitemap is reachable! ($BYTES bytes)"
            echo "   First 300 chars of sitemap:"
            head -c 300 /tmp/sitemap_body.txt || true
          else
            echo ""
            echo "⚠️  Sitemap returned HTTP $HTTP_CODE — the Node.js script will retry automatically"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          # ✅ This step NEVER exits with error — diagnostics only
          exit 0

      # ──────────────────────────────────────────
      # 4. Restore sitemap snapshot from previous run
      #    Cache miss on first run is normal — script handles it gracefully
      # ──────────────────────────────────────────
      - name: 💾  Restore previous sitemap snapshot
        id: cache-sitemap
        uses: actions/cache@v4
        with:
          path: scripts/gsc/previous-sitemap-snapshot.xml
          key: sitemap-snapshot-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            sitemap-snapshot-${{ runner.os }}-

      - name: ℹ️  Log snapshot cache status
        run: |
          if [ "${{ steps.cache-sitemap.outputs.cache-hit }}" = "true" ]; then
            echo "✅ Found cached sitemap snapshot from a previous run"
          else
            echo "⚠️  No cached snapshot — all current sitemap URLs will be treated as NEW (normal on first run)"
          fi

      # ──────────────────────────────────────────
      # 5. Restore pending-urls.json (overflow queue from previous run)
      # ──────────────────────────────────────────
      - name: 💾  Restore pending-urls queue
        uses: actions/cache@v4
        with:
          path: scripts/gsc/pending-urls.json
          key: pending-urls-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pending-urls-${{ runner.os }}-${{ github.ref_name }}-

      # ──────────────────────────────────────────
      # 6. Compare sitemaps → produces diff-result.json
      #    The Node.js script itself handles retry logic internally
      # ──────────────────────────────────────────
      - name: 🔍  Compare old vs new sitemap
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_ALL: ${{ github.event.inputs.force_all }}
        run: |
          if [ "$FORCE_ALL" = "true" ]; then
            echo "⚡ force_all=true — removing old snapshot (all URLs will be submitted)"
            rm -f scripts/gsc/previous-sitemap-snapshot.xml
          fi
          node scripts/gsc/compare-sitemaps.mjs \
            --sitemap-url "$SITE_URL/sitemap.xml" \
            --prev-snapshot scripts/gsc/previous-sitemap-snapshot.xml \
            --output-dir scripts/gsc

      # ──────────────────────────────────────────
      # 7. Submit to Google Indexing API
      #    Job Summary is written to GITHUB_STEP_SUMMARY (visible in Actions UI)
      # ──────────────────────────────────────────
      - name: 📡  Submit URLs to Google Indexing API
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DAILY_QUOTA: "200"
          REQUEST_DELAY_MS: "1500"
        run: node scripts/gsc/submit-to-gsc.mjs

      # ──────────────────────────────────────────
      # 8. Promote current snapshot → previous (for next run's diff)
      # ──────────────────────────────────────────
      - name: 🔁  Promote sitemap snapshot for next run
        if: always()
        run: |
          if [ -f scripts/gsc/current-sitemap-snapshot.xml ]; then
            cp scripts/gsc/current-sitemap-snapshot.xml scripts/gsc/previous-sitemap-snapshot.xml
            echo "✅ Snapshot promoted: current → previous"
          else
            echo "⚠️  No current snapshot file to promote (compare step may have failed)"
          fi

      # ──────────────────────────────────────────
      # 9. Save updated snapshot to cache
      # ──────────────────────────────────────────
      - name: 💾  Save sitemap snapshot for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/gsc/previous-sitemap-snapshot.xml
          key: sitemap-snapshot-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      # ──────────────────────────────────────────
      # 10. Save pending-urls.json for next run
      # ──────────────────────────────────────────
      - name: 💾  Save pending-urls queue for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/gsc/pending-urls.json
          key: pending-urls-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      # ──────────────────────────────────────────
      # 11. Upload diff result as downloadable artifact (30-day audit trail)
      # ──────────────────────────────────────────
      - name: 📤  Upload diff artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gsc-diff-run-${{ github.run_number }}
          path: |
            scripts/gsc/diff-result.json
            scripts/gsc/current-sitemap-snapshot.xml
          if-no-files-found: warn
          retention-days: 30
