name: 🌿 GSC Auto-Indexing

on:
  push:
    branches:
      - main
  # Manual trigger from GitHub UI → Actions tab → Run workflow
  workflow_dispatch:
    inputs:
      force_all:
        description: "Submit ALL sitemap URLs (ignores diff — use for first-time or full reindex)"
        required: false
        default: "false"

# Only one indexing run at a time — never cancel a running one
concurrency:
  group: gsc-indexing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  index:
    name: Compare Sitemaps & Submit to GSC
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ──────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────
      # 2. Setup Node 24 (matches current GitHub Actions default, no deprecation warnings)
      # ──────────────────────────────────────────
      - name: 🟢  Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ──────────────────────────────────────────
      # 3. Debug — confirm SITE_URL secret is set and reachable
      #    (does NOT print the secret value — GitHub masks it automatically)
      # ──────────────────────────────────────────
      - name: 🔎  Debug — verify SITE_URL is reachable
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "❌ SITE_URL secret is EMPTY or not set!"
            echo "   → Go to GitHub repo → Settings → Secrets and variables → Actions"
            echo "   → Add secret: Name=SITE_URL  Value=https://yourdomain.com"
            exit 1
          fi

          echo "✅ SITE_URL secret is set (value hidden by GitHub)"
          echo "📡 Testing connectivity to sitemap..."

          # Verbose curl: shows DNS resolution and HTTP response code
          HTTP_CODE=$(curl -s -o /tmp/sitemap_test.txt -w "%{http_code}" \
            --max-time 15 \
            --connect-timeout 10 \
            -L \
            "$SITE_URL/sitemap.xml" 2>/tmp/curl_error.txt) || true

          echo "   HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Site is reachable and sitemap returned HTTP 200"
            BYTES=$(wc -c < /tmp/sitemap_test.txt)
            echo "   Sitemap size: $BYTES bytes"
          elif [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
            echo "❌ Could NOT connect to $SITE_URL"
            echo "   This usually means:"
            echo "   1. SITE_URL secret has a typo (check for trailing slash or wrong domain)"
            echo "   2. The site is not yet deployed / is down"
            echo "   3. The site blocks GitHub Actions IP ranges (unlikely but possible)"
            echo ""
            echo "   curl error output:"
            cat /tmp/curl_error.txt || true
            exit 1
          else
            echo "⚠️  Site returned HTTP $HTTP_CODE — continuing anyway"
            echo "   Response body preview:"
            head -c 500 /tmp/sitemap_test.txt || true
          fi

      # ──────────────────────────────────────────
      # 4. Restore sitemap snapshot from previous run
      #    Cache miss on first run is normal — script handles it gracefully
      # ──────────────────────────────────────────
      - name: 💾  Restore previous sitemap snapshot
        id: cache-sitemap
        uses: actions/cache@v4
        with:
          path: scripts/gsc/previous-sitemap-snapshot.xml
          key: sitemap-snapshot-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            sitemap-snapshot-${{ runner.os }}-

      - name: ℹ️  Log snapshot cache status
        run: |
          if [ "${{ steps.cache-sitemap.outputs.cache-hit }}" = "true" ]; then
            echo "✅ Found cached sitemap snapshot from a previous run"
          else
            echo "⚠️  No cached snapshot — all current sitemap URLs will be treated as NEW (normal on first run)"
          fi

      # ──────────────────────────────────────────
      # 5. Restore pending-urls.json (overflow queue from previous run)
      # ──────────────────────────────────────────
      - name: 💾  Restore pending-urls queue
        uses: actions/cache@v4
        with:
          path: scripts/gsc/pending-urls.json
          key: pending-urls-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pending-urls-${{ runner.os }}-${{ github.ref_name }}-

      # ──────────────────────────────────────────
      # 6. Compare sitemaps → produces diff-result.json
      #    The Node.js script itself handles retry logic internally
      # ──────────────────────────────────────────
      - name: 🔍  Compare old vs new sitemap
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_ALL: ${{ github.event.inputs.force_all }}
        run: |
          if [ "$FORCE_ALL" = "true" ]; then
            echo "⚡ force_all=true — removing old snapshot (all URLs will be submitted)"
            rm -f scripts/gsc/previous-sitemap-snapshot.xml
          fi
          node scripts/gsc/compare-sitemaps.mjs \
            --sitemap-url "$SITE_URL/sitemap.xml" \
            --prev-snapshot scripts/gsc/previous-sitemap-snapshot.xml \
            --output-dir scripts/gsc

      # ──────────────────────────────────────────
      # 7. Submit to Google Indexing API
      #    Job Summary is written to GITHUB_STEP_SUMMARY (visible in Actions UI)
      # ──────────────────────────────────────────
      - name: 📡  Submit URLs to Google Indexing API
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DAILY_QUOTA: "200"
          REQUEST_DELAY_MS: "1500"
        run: node scripts/gsc/submit-to-gsc.mjs

      # ──────────────────────────────────────────
      # 8. Promote current snapshot → previous (for next run's diff)
      # ──────────────────────────────────────────
      - name: 🔁  Promote sitemap snapshot for next run
        if: always()
        run: |
          if [ -f scripts/gsc/current-sitemap-snapshot.xml ]; then
            cp scripts/gsc/current-sitemap-snapshot.xml scripts/gsc/previous-sitemap-snapshot.xml
            echo "✅ Snapshot promoted: current → previous"
          else
            echo "⚠️  No current snapshot file to promote (compare step may have failed)"
          fi

      # ──────────────────────────────────────────
      # 9. Save updated snapshot to cache
      # ──────────────────────────────────────────
      - name: 💾  Save sitemap snapshot for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/gsc/previous-sitemap-snapshot.xml
          key: sitemap-snapshot-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      # ──────────────────────────────────────────
      # 10. Save pending-urls.json for next run
      # ──────────────────────────────────────────
      - name: 💾  Save pending-urls queue for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/gsc/pending-urls.json
          key: pending-urls-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      # ──────────────────────────────────────────
      # 11. Upload diff result as downloadable artifact (30-day audit trail)
      # ──────────────────────────────────────────
      - name: 📤  Upload diff artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gsc-diff-run-${{ github.run_number }}
          path: |
            scripts/gsc/diff-result.json
            scripts/gsc/current-sitemap-snapshot.xml
          if-no-files-found: warn
          retention-days: 30
