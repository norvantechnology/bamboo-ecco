name: 🏪 Google Business Profile — Auto Posts

on:
  # Post every Monday at 9:00 AM IST (3:30 AM UTC)
  schedule:
    - cron: '30 3 * * 1'
  # Manual trigger
  workflow_dispatch:
    inputs:
      post_type:
        description: "Post type to publish"
        required: false
        default: "PRODUCT"
        type: choice
        options:
          - PRODUCT
          - OFFER
          - WHATS_NEW

concurrency:
  group: gbp-posts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    name: Publish GBP Post
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install deps
        run: npm install node-fetch@3

      - name: 🏪 Publish to Google Business Profile
        env:
          GBP_ACCESS_TOKEN: ${{ secrets.GBP_ACCESS_TOKEN }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          SITE_URL: "https://bambooecohub.com"
          API_URL: "https://bamboo-ecco-production.up.railway.app"
          POST_TYPE: ${{ github.event.inputs.post_type || 'PRODUCT' }}
        run: node scripts/gbp/post.mjs
